  <g filter="url(#glow)">
    <circle cx="50" cy="40" r="4" fill="#0066FF" />
  </g>
  <text x="30" y="42" text-anchor="middle" fill="white" style="font: 900 24px 'Outfit', sans-serif; letter-spacing: -1.5px;">IND</text>
  <defs>
